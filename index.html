<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🤖 全球AI行业资讯日报</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            padding: 20px;
        }

        /* ── 顶部导航栏 ── */
        .navbar {
            max-width: 1200px;
            margin: 0 auto 20px;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 16px;
            padding: 16px 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 14px;
        }
        .navbar-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            color: white;
            font-size: 1.2em;
            font-weight: 700;
            letter-spacing: -0.3px;
        }
        .navbar-brand .icon { font-size: 1.5em; }

        .date-nav {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .date-nav label {
            color: rgba(255,255,255,0.7);
            font-size: 0.9em;
        }
        .date-select {
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.25);
            border-radius: 10px;
            color: white;
            padding: 8px 14px;
            font-size: 0.95em;
            cursor: pointer;
            outline: none;
            min-width: 150px;
        }
        .date-select option { background: #302b63; color: white; }
        .date-select:hover { background: rgba(255,255,255,0.18); }

        .nav-btn {
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.25);
            border-radius: 10px;
            color: white;
            padding: 8px 14px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.2s;
        }
        .nav-btn:hover:not(:disabled) { background: rgba(255,255,255,0.22); }
        .nav-btn:disabled { opacity: 0.35; cursor: not-allowed; }

        /* ── 内容区 ── */
        #news-content { max-width: 1200px; margin: 0 auto; }

        /* ── 加载 & 错误状态 ── */
        .state-box {
            background: rgba(255,255,255,0.07);
            border-radius: 20px;
            padding: 80px 40px;
            text-align: center;
            color: rgba(255,255,255,0.7);
        }
        .state-box .icon { font-size: 3em; margin-bottom: 16px; }
        .state-box p { font-size: 1.1em; }
        .spinner {
            width: 44px; height: 44px;
            border: 4px solid rgba(255,255,255,0.15);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── 注入的日报内部样式兼容 ── */
        #news-content .container {
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }
    </style>
</head>
<body>

    <!-- 顶部导航 -->
    <div class="navbar">
        <div class="navbar-brand">
            <span class="icon">🤖</span>
            <span>全球 AI 行业资讯日报</span>
        </div>
        <div class="date-nav">
            <button class="nav-btn" id="btn-prev" title="前一天">‹ 前一天</button>
            <select class="date-select" id="date-select"></select>
            <button class="nav-btn" id="btn-next" title="后一天">后一天 ›</button>
        </div>
    </div>

    <!-- 日报内容区 -->
    <div id="news-content">
        <div class="state-box">
            <div class="spinner"></div>
            <p>正在加载日报...</p>
        </div>
    </div>

    <script>
    (async () => {
        const contentEl = document.getElementById('news-content');
        const selectEl  = document.getElementById('date-select');
        const btnPrev   = document.getElementById('btn-prev');
        const btnNext   = document.getElementById('btn-next');

        let dates = [];
        let currentIndex = 0;

        // ── 格式化日期显示 ──
        function formatLabel(d) {
            const [y, m, day] = d.split('-');
            const weekdays = ['日','一','二','三','四','五','六'];
            const date = new Date(+y, +m - 1, +day);
            return `${y}年${m}月${day}日 周${weekdays[date.getDay()]}`;
        }

        // ── 加载内容 ──
        async function loadNews(date) {
            contentEl.innerHTML = `<div class="state-box"><div class="spinner"></div><p>正在加载 ${date} 的日报...</p></div>`;
            try {
                const res = await fetch(`news/${date}.html?t=${Date.now()}`);
                if (!res.ok) throw new Error('not found');
                const html = await res.text();
                contentEl.innerHTML = html;
                // 更新 URL hash，支持分享
                history.replaceState(null, '', `#${date}`);
            } catch {
                contentEl.innerHTML = `<div class="state-box"><div class="icon">📭</div><p>${date} 暂无日报内容</p></div>`;
            }
        }

        // ── 切换到指定 index ──
        function switchTo(idx) {
            if (idx < 0 || idx >= dates.length) return;
            currentIndex = idx;
            selectEl.value = dates[idx];
            btnPrev.disabled = idx >= dates.length - 1;
            btnNext.disabled = idx <= 0;
            loadNews(dates[idx]);
        }

        // ── 初始化 ──
        try {
            const res = await fetch(`news/index.json?t=${Date.now()}`);
            const data = await res.json();
            dates = data.dates || [];

            if (dates.length === 0) {
                contentEl.innerHTML = `<div class="state-box"><div class="icon">📭</div><p>暂无日报数据</p></div>`;
                return;
            }

            // 填充下拉选择器（最新在上）
            dates.forEach((d, i) => {
                const opt = document.createElement('option');
                opt.value = d;
                opt.textContent = formatLabel(d);
                selectEl.appendChild(opt);
            });

            // 读取 hash 决定初始日期
            const hash = location.hash.replace('#', '');
            const hashIdx = dates.indexOf(hash);
            const initIdx = hashIdx >= 0 ? hashIdx : 0;

            switchTo(initIdx);
        } catch {
            contentEl.innerHTML = `<div class="state-box"><div class="icon">⚠️</div><p>加载失败，请刷新重试</p></div>`;
        }

        // ── 事件绑定 ──
        selectEl.addEventListener('change', () => {
            const idx = dates.indexOf(selectEl.value);
            if (idx >= 0) switchTo(idx);
        });
        btnPrev.addEventListener('click', () => switchTo(currentIndex + 1));
        btnNext.addEventListener('click', () => switchTo(currentIndex - 1));

        // ── 支持浏览器前进/后退 ──
        window.addEventListener('hashchange', () => {
            const hash = location.hash.replace('#', '');
            const idx = dates.indexOf(hash);
            if (idx >= 0) switchTo(idx);
        });
    })();
    </script>
</body>
</html>
